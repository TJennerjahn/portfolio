<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portfolio CMS</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f4f7f9;
        color: #fafafa;
      }

      #loading-shell {
        position: fixed;
        top: 1rem;
        left: 50%;
        transform: translateX(-50%);
        width: min(32rem, calc(100vw - 2rem));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1rem;
        background: rgba(24, 24, 27, 0.88);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        padding: 1.5rem;
        z-index: 9999;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
      }

      p {
        margin: 0.5rem 0 0;
        line-height: 1.5;
      }

      code {
        font-family:
          "SFMono-Regular", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }

      #notice {
        color: #d4d4d8;
        font-size: 0.95rem;
      }

      #status {
        color: #a1a1aa;
      }

      body.cms-ready #loading-shell {
        display: none;
      }
    </style>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <main id="loading-shell">
      <h1>Portfolio CMS</h1>
      <p id="notice">
        Loading the editor. For local authoring, run <code>npm run dev:cms</code>.
      </p>
      <p id="status">Fetching configuration…</p>
    </main>

    <script src="https://unpkg.com/decap-cms@^3.8.3/dist/decap-cms.js"></script>
    <script>
      (async function initCMS() {
        const notice = document.getElementById("notice");
        const status = document.getElementById("status");

        try {
          const response = await fetch("/api/decap/config", {
            credentials: "same-origin",
          });

          if (!response.ok) {
            throw new Error("Failed to load the Decap configuration.");
          }

          const payload = await response.json();
          status.textContent = "Starting editor…";

          if (!payload.authConfigured && location.hostname !== "localhost") {
            notice.textContent =
              "Production login is not configured yet. Local authoring still works with `npm run dev:cms`.";
          }

          window.CMS.init({ config: payload.config });
          document.body.classList.add("cms-ready");
        } catch (error) {
          status.textContent =
            error instanceof Error ? error.message : "Unable to start Decap CMS.";
        }
      })();
    </script>
  </body>
</html>
